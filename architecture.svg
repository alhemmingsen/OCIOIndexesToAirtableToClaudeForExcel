<svg viewBox="0 0 1280 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .lane   { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.5; }
      .laneh  { font-size:15px; font-weight:700; fill:#334155; text-anchor:middle; }
      .box    { rx:8; stroke-width:1.5; }
      .src    { fill:#eef2ff; stroke:#6366f1; }
      .gh     { fill:#ecfdf5; stroke:#10b981; }
      .at     { fill:#fef3c7; stroke:#f59e0b; }
      .cl     { fill:#fff1ed; stroke:#d97757; }
      .t      { font-size:12.5px; fill:#1f2937; text-anchor:middle; }
      .tb     { font-size:13px; font-weight:700; fill:#111827; text-anchor:middle; }
      .sub    { font-size:10.5px; fill:#64748b; text-anchor:middle; }
      .flow   { stroke:#64748b; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .note   { font-size:11px; fill:#94a3b8; text-anchor:middle; font-style:italic; }
    </style>
  </defs>

  <text x="640" y="34" font-size="20" font-weight="700" fill="#0f172a" text-anchor="middle">Alpha Nasdaq OCIO returns pipeline</text>
  <text x="640" y="56" class="note">quarterly returns scraped to a store of record; Claude reads them on demand into working documents</text>

  <rect class="lane" x="30"  y="90" width="250" height="560" rx="12"/>
  <rect class="lane" x="310" y="90" width="330" height="560" rx="12"/>
  <rect class="lane" x="670" y="90" width="260" height="560" rx="12"/>
  <rect class="lane" x="960" y="90" width="290" height="560" rx="12"/>

  <text x="155"  y="116" class="laneh">Source</text>
  <text x="155"  y="134" class="sub">alphacapitalmgmt.com</text>
  <text x="475"  y="116" class="laneh">GitHub Actions</text>
  <text x="475"  y="134" class="sub">weekly poll, unattended</text>
  <text x="800"  y="116" class="laneh">Airtable</text>
  <text x="800"  y="134" class="sub">store of record</text>
  <text x="1105" y="116" class="laneh">Claude</text>
  <text x="1105" y="134" class="sub">on demand, analyst-driven</text>

  <!-- Source -->
  <rect class="box src" x="55" y="230" width="200" height="72"/>
  <text x="155" y="258" class="tb">OCIO results table</text>
  <text x="155" y="277" class="sub">"M/D/YYYY Index Results"</text>
  <text x="155" y="292" class="sub">15 indices, MRQ..10YR</text>

  <rect class="box src" x="55" y="345" width="200" height="66"/>
  <text x="155" y="373" class="tb">Snapshot PDF</text>
  <text x="155" y="392" class="sub">fallback source</text>

  <!-- GitHub Actions internals -->
  <rect class="box gh" x="345" y="165" width="260" height="56"/>
  <text x="475" y="189" class="tb">weekly cron</text>
  <text x="475" y="207" class="sub">Mondays (idempotent)</text>

  <rect class="box gh" x="345" y="255" width="260" height="150"/>
  <text x="475" y="281" class="tb">Python ingestion</text>
  <text x="475" y="306" class="t">parse HTML table</text>
  <text x="475" y="328" class="t">Claude-API PDF fallback</text>
  <text x="475" y="350" class="t">normalize (per index)</text>
  <text x="475" y="372" class="t">skip if quarter present</text>
  <text x="475" y="393" class="t">upsert on Index + Date</text>

  <rect class="box gh" x="345" y="435" width="260" height="54"/>
  <text x="475" y="458" class="tb">repo secrets</text>
  <text x="475" y="477" class="sub">Airtable token, base id, API key</text>

  <!-- Airtable -->
  <rect class="box at" x="695" y="300" width="210" height="96"/>
  <text x="800" y="330" class="tb">OCIO Index Returns</text>
  <text x="800" y="351" class="sub">wide: one row per</text>
  <text x="800" y="366" class="sub">index x quarter-end</text>
  <text x="800" y="384" class="sub">MRQ / 1 / 3 / 5 / 7 / 10 YR</text>

  <!-- Claude layer -->
  <rect class="box cl" x="990" y="205" width="230" height="80"/>
  <text x="1105" y="233" class="tb">nasdaq-ocio-returns skill</text>
  <text x="1105" y="253" class="sub">Airtable MCP, read-only</text>
  <text x="1105" y="270" class="sub">resolve index + fetch rows</text>

  <rect class="box cl" x="990" y="320" width="230" height="60"/>
  <text x="1105" y="346" class="tb">Claude for Excel</text>
  <text x="1105" y="366" class="sub">fills template in place</text>

  <rect class="box cl" x="990" y="415" width="230" height="60"/>
  <text x="1105" y="441" class="tb">Filled template</text>
  <text x="1105" y="461" class="sub">OCIO peer comparison</text>

  <!-- Flows: source -> GH -->
  <path class="flow" d="M255,270 C300,270 300,315 343,325"/>
  <path d="M255,378 C300,378 300,345 343,340" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- within GH: cron -> ingestion, secrets -> ingestion -->
  <path class="flow" d="M475,221 L475,253"/>
  <path d="M475,435 L475,407" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- GH -> Airtable -->
  <path class="flow" d="M605,340 C650,340 655,345 693,347"/>

  <!-- Airtable -> Claude skill -->
  <path class="flow" d="M905,340 C945,340 950,270 988,258"/>

  <!-- Claude internal flow -->
  <path class="flow" d="M1105,285 L1105,318"/>
  <path class="flow" d="M1105,380 L1105,413"/>

  <text x="640" y="682" class="note">HTML table is the primary source; the snapshot PDF is extracted via the Claude API only if the table fails to parse</text>
</svg>
